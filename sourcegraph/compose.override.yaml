# Put local Sourcegraph customizations in this file so the base manifest
# stays aligned with the upstream release layout for easier upgrades.
#
services:
  caddy:
    cpus: 0.5
    mem_limit: '256m'

  sourcegraph-frontend-0:
    cpus: 0.75
    mem_limit: '1536m'
    environment:
      - SITE_CONFIG_FILE=/home/sourcegraph/site-config.json
    volumes:
      - 'sourcegraph-frontend-0:/mnt/cache'
      - './site-config.json:/home/sourcegraph/site-config.json:ro'

  sourcegraph-frontend-internal:
    cpus: 0.75
    mem_limit: '1536m'
    environment:
      - SITE_CONFIG_FILE=/home/sourcegraph/site-config.json
    volumes:
      - 'sourcegraph-frontend-internal-0:/mnt/cache'
      - './site-config.json:/home/sourcegraph/site-config.json:ro'

  gitserver-0:
    cpus: 0.5
    mem_limit: '1g'

  zoekt-indexserver-0:
    cpus: 0.5
    mem_limit: '1536m'

  zoekt-webserver-0:
    cpus: 0.5
    mem_limit: '1536m'
    # The image's tini wrapper fails under Colima, so invoke zoekt directly.
    entrypoint:
      - zoekt-webserver
    command:
      - -index
      - /data/index
      - -pprof
      - -rpc
      - -indexserver_proxy

  searcher-0:
    cpus: 0.25
    mem_limit: '512m'

  precise-code-intel-worker:
    cpus: 0.25
    mem_limit: '256m'
    profiles:
      - codeintel

  worker:
    cpus: 0.5
    mem_limit: '768m'

  syntactic-code-intel-worker:
    cpus: 0.25
    mem_limit: '256m'
    profiles:
      - codeintel

  syntect-server:
    cpus: 0.25
    mem_limit: '512m'

  prometheus:
    cpus: 0.25
    mem_limit: '256m'

  grafana:
    cpus: 0.25
    mem_limit: '256m'

  cadvisor:
    cpus: 0.25
    mem_limit: '256m'
    profiles:
      - metrics

  node-exporter:
    cpus: 0.1
    mem_limit: '128m'

  pgsql:
    cpus: 0.5
    mem_limit: '1536m'

  codeintel-db:
    cpus: 0.5
    mem_limit: '1g'

  codeinsights-db:
    cpus: 0.25
    mem_limit: '512m'

  blobstore:
    cpus: 0.25
    mem_limit: '256m'

  redis-store:
    cpus: 0.25
    mem_limit: '256m'

  redis-cache:
    cpus: 0.25
    mem_limit: '256m'

  mcp-bridge:
    build:
      context: .
      dockerfile: mcp-bridge/Dockerfile
    cpus: 0.5
    mem_limit: '256m'
    environment:
      - PORT=7081
      - SOURCEGRAPH_URL=${SOURCEGRAPH_INTERNAL_URL:-http://caddy}
      - SOURCEGRAPH_ACCESS_TOKEN=${SOURCEGRAPH_ACCESS_TOKEN:-}
      - SOURCEGRAPH_USERNAME=${SOURCEGRAPH_ADMIN_USERNAME:-}
      - SOURCEGRAPH_EMAIL=${SOURCEGRAPH_ADMIN_EMAIL:-}
      - SOURCEGRAPH_PASSWORD=${SOURCEGRAPH_ADMIN_PASSWORD:-}
    ports:
      - '${MCP_BIND_ADDRESS:-127.0.0.1}:${MCP_PORT:-7081}:7081'
    depends_on:
      sourcegraph-frontend-0:
        condition: service_healthy
    networks:
      - sourcegraph
    restart: unless-stopped
