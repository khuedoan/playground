apiVersion: secretspec.dev/v1alpha1
kind: SecretSpec
metadata:
  name: payments-api
  namespace: default
spec:
  provider:
    type: openbao
    address: http://127.0.0.1:8200
    auth:
      method: token
      tokenFromEnv: BAO_TOKEN
  source:
    path: apps/data/payments/api
    format: kv-v2
  target:
    name: payments-api-secret
    type: Opaque
  mappings:
    - sourceKey: username
      targetKey: username
    - sourceKey: password
      targetKey: password
    - sourceKey: endpoint
      targetKey: endpoint
